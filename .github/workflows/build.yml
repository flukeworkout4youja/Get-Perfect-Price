name: Build Mac App

on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install pyinstaller pandas openpyxl

      - name: Build app
        run: pyinstaller --onefile --windowed --name ExcelTool app.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ExcelTool-Mac
          path: dist/ExcelTool.app