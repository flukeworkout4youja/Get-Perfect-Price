<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get Perfect Price</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Get Perfect Price</h1>
      <div class="lang-buttons">
        <button id="enBtn" class="active">EN</button>
        <button id="thBtn">TH</button>
      </div>
    </div>

    <!-- Input Card -->
    <div class="card">
      <h2 data-i18n="inputTitle">Pricing Inputs</h2>

      <div class="form-group">
        <label data-i18n="costLabel">Product Cost (฿)</label>
        <input type="number" id="cost" placeholder="100">
      </div>

      <div class="form-group">
        <label data-i18n="extraLabel">Additional Cost (฿)</label>
        <input type="number" id="extra" placeholder="20">
      </div>

      <div class="form-group">
        <label data-i18n="feeLabel">Platform Fee (%)</label>
        <input type="number" id="fee" placeholder="10">
      </div>

      <div class="form-group">
        <label data-i18n="profitLabel">Target Profit (%)</label>
        <input type="number" id="profit" placeholder="30">
      </div>
    </div>

    <!-- Result Card -->
    <div class="card">
      <h2 data-i18n="resultTitle">Recommended Price</h2>

      <div class="result-box">
        <h3 data-i18n="recommended">Selling Price</h3>
        <div class="price" id="sellingPrice">฿ 0.00</div>
      </div>

      <div class="result-row">
        <span data-i18n="netProfit">Net Profit / Unit</span>
        <strong id="netProfit">฿ 0.00</strong>
      </div>

      <div class="result-row">
        <span data-i18n="minimumPrice">Minimum Safe Price</span>
        <strong id="minPrice">฿ 0.00</strong>
      </div>

      <div class="note" data-i18n="note">
        Calculated including platform fee and target profit.
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
